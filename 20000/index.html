<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>20000</title>
  <meta name="description" content="20000 - 우주 슈팅 게임. Bronze, Silver, Gold, Platinum 보스 격파. 20000m 도전. 무료 플레이.">
  <meta name="keywords" content="20000, 20000게임, 우주슈팅, 슈팅게임, 우주게임, 무료게임, 브라우저게임">
  <meta property="og:title" content="20000">
  <meta property="og:description" content="20000 우주 슈팅 게임. Bronze~Platinum 보스 격파 도전! 무료 플레이.">
  <meta property="og:type" content="website">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    }
    #gameContainer {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,150,255,0.3);
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    /* 가상 조이스틱/버튼 (모바일) */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 16px 24px 28px;
      pointer-events: none;
      z-index: 100;
    }
    #controls.visible { display: flex; }
    .joystickZone {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(0,80,150,0.35);
      border: 3px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      touch-action: none;
      position: relative;
    }
    .joystickStick {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(0,150,255,0.7);
      border: 2px solid rgba(255,255,255,0.6);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: transform 0.05s ease-out;
    }
    .joystickZone.active .joystickStick {
      transition: none;
    }
    .fireBtn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.5);
      background: linear-gradient(180deg, #e63946, #c1121f);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 6px 24px rgba(230,57,70,0.5);
      transition: transform 0.08s;
      touch-action: none;
    }
    .fireBtn:active { transform: scale(0.92); }
  </style>
</head>
<body>
  <h1 style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden">20000</h1>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div id="controls">
    <div class="joystickZone" id="joystickZone">
      <div class="joystickStick" id="joystickStick"></div>
    </div>
    <button class="fireBtn" data-key=" ">FIRE</button>
  </div>

  <script>
(function() {
  const VALID_RANKS = ["Bronze1","Bronze2","Silver1","Silver2","Gold1","Gold2","Platinum1","Platinum2"];
  const RANK_SAVE_KEY = "20000_best_rank";
  const BOSS_CLEARED_KEY = "20000_boss_cleared";
  const GAME_CLEARED_KEY = "20000_game_cleared";

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const controls = document.getElementById('controls');

  let WIDTH, HEIGHT;
  function resize() {
    WIDTH = canvas.width = window.innerWidth;
    HEIGHT = canvas.height = window.innerHeight;
    controls.classList.toggle('visible', 'ontouchstart' in window);
  }
  window.addEventListener('resize', resize);
  resize();

  // === 에셋 로드 ===
  const assets = {
    playerBasic: new Image(),
    playerUpgrade: new Image(),
    enemy: new Image(),
    bossImgs: [new Image(), new Image(), new Image(), new Image()],
    bgMusic: new Audio('배경음.mp3'),
    explosionSound: new Audio('폭발.mp3')
  };
  const ASSET_NAMES = {
    playerBasic: '기본우주선.png',
    playerUpgrade: '업그레이드우주선.png',
    enemy: '적 우주선.png',
    bossImgs: ['브론즈보스.png','실버보스.png','골드보스.png','플래티넘보스.png']
  };
  let assetsLoaded = false;
  assets.playerBasic.src = ASSET_NAMES.playerBasic;
  assets.playerUpgrade.src = ASSET_NAMES.playerUpgrade;
  assets.enemy.src = ASSET_NAMES.enemy;
  assets.bossImgs.forEach((img,i)=>img.src=ASSET_NAMES.bossImgs[i]);
  assets.bgMusic.volume = 0.5;
  assets.bgMusic.loop = true;
  assets.explosionSound.volume = 0.7;
  Promise.all([
    new Promise(r=>{assets.playerBasic.onload=r;assets.playerBasic.onerror=r;}),
    new Promise(r=>{assets.playerUpgrade.onload=r;assets.playerUpgrade.onerror=r;}),
    new Promise(r=>{assets.enemy.onload=r;assets.enemy.onerror=r;}),
    ...assets.bossImgs.map(img=>new Promise(r=>{img.onload=r;img.onerror=r;}))
  ]).then(()=>{assetsLoaded=true;});

  // === 상태 ===
  let state = 'menu'; // menu, playing, gameover, clear
  let playerX, playerY, playerHp, PLAYER_MAX_HP = 500, playerSpeed = 9;
  let upgradeLevel = 0, upgradeGauge = 0, GAUGE_MAX = 100, MAX_UPGRADE = 5;
  let bullets = [], enemyBullets = [], enemies = [], explosions = [];
  let distance = 0, boss = null, bossSpawned = [false,false,false,false];
  let bossClearedThisRun = [false,false,false,false];
  let bestRankString = "Bronze1", bossCleared = [false,false,false,false], gameClearedOnce = false;
  let shootCd = 0;
  let stars = [];
  const BOSS_DISTANCE = [3000, 7000, 12000, 20000];

  function loadSave() {
    try {
      const r = localStorage.getItem(RANK_SAVE_KEY);
      if (r && VALID_RANKS.includes(r)) bestRankString = r;
      const bc = JSON.parse(localStorage.getItem(BOSS_CLEARED_KEY) || '[]');
      if (Array.isArray(bc) && bc.length === 4) bossCleared = bc;
      gameClearedOnce = localStorage.getItem(GAME_CLEARED_KEY) === '1';
    } catch(e) {}
  }
  function saveSave() {
    try {
      localStorage.setItem(RANK_SAVE_KEY, bestRankString);
      localStorage.setItem(BOSS_CLEARED_KEY, JSON.stringify(bossCleared));
      if (gameClearedOnce) localStorage.setItem(GAME_CLEARED_KEY, '1');
    } catch(e) {}
  }
  loadSave();

  function getCurrentRank() {
    const names = ["Bronze","Silver","Gold","Platinum"];
    const idx = Math.min(bossClearedThisRun.filter(Boolean).length, 3);
    return names[idx] + (boss ? "2" : "1");
  }
  function updateBestRank() {
    const cur = getCurrentRank();
    if (VALID_RANKS.includes(cur) && VALID_RANKS.indexOf(cur) > VALID_RANKS.indexOf(bestRankString)) {
      bestRankString = cur;
      saveSave();
    }
  }

  // === 그리기 헬퍼 ===
  function drawShip(x, y, w, h, color, isUpgrade) {
    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.rotate(0);
    ctx.translate(-(x+w/2), -(y+h/2));
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x + w/2, y);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x + w/2, y + h*0.85);
    ctx.lineTo(x, y + h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    if (isUpgrade) {
      ctx.fillStyle = 'rgba(255,200,0,0.6)';
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h*0.4, w*0.2, h*0.15, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
  function drawBossShape(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(x + 10, y + 10, w/4, h/4);
  }

  function createExplosion(x, y) {
    try { assets.explosionSound.currentTime=0; assets.explosionSound.play(); } catch(e){}
    for (let i = 0; i < 50; i++) {
      explosions.push({
        x, y, dx: (Math.random()-0.5)*12, dy: (Math.random()-0.5)*12,
        life: 20 + Math.random()*40, size: 2 + Math.random()*4,
        color: ['#ffc800','#ff6400','#fff'][Math.floor(Math.random()*3)]
      });
    }
  }

  function spawnBoss(rank) {
    const cfgs = [
      { color: '#cd7f32', hp: 690 },   // Bronze
      { color: '#c0c0c0', hp: 1035 }, // Silver
      { color: '#ffd700', hp: 1380 }, // Gold
      { color: '#e5e4e2', hp: 2070 }  // Platinum
    ];
    const r = ["Bronze","Silver","Gold","Platinum"].indexOf(rank);
    const cfg = cfgs[r] || cfgs[0];
    const laserCount = [3,4,5,7][r];
    const shootDelay = [80,70,60,50][r];
    const anglesMap = { 3:[-20,0,20], 4:[-30,-10,10,30], 5:[-40,-20,0,20,40], 7:[-60,-40,-20,0,20,40,60] };
    boss = {
      x: WIDTH/2 - 150, y: -300, w: 300, h: 300, direction: 1, speed: 3,
      hp: cfg.hp, maxHp: cfg.hp, color: cfg.color, rankIndex: r,
      shootCd: shootDelay, shootDelay, laserCount, angles: anglesMap[laserCount] || [0]
    };
  }

  function bossShoot() {
    if (!boss) return;
    boss.shootCd--;
    if (boss.shootCd <= 0) {
      const midX = boss.x + 150;
      const midY = boss.y + 150;
      for (const a of boss.angles) {
        const rad = a * Math.PI / 180;
        enemyBullets.push({
          x: midX, y: midY,
          dx: Math.sin(rad)*7, dy: Math.cos(rad)*9,
          heal: Math.random() < 0.05
        });
      }
      boss.shootCd = boss.shootDelay;
    }
  }

  function spawnEnemy() {
    if (boss) return;
    enemies.push({
      x: 50 + Math.random()*(WIDTH-170), y: -80, w: 70, h: 70, hp: 60, maxHp: 60
    });
  }

  function shootPlayer() {
    const cx = playerX + 90;
    const angleSets = [[0],[-10,0,10],[-15,-5,5,15],[-20,-10,0,10,20],[-30,-20,-10,0,10,20,30]];
    const angles = angleSets[Math.min(upgradeLevel, 4)] || angleSets[4];
    for (const a of angles) {
      const rad = a * Math.PI / 180;
      bullets.push({ x: cx, y: playerY, dx: Math.sin(rad)*6, dy: -Math.cos(rad)*12 });
    }
  }

  function enemyShoot(e) {
    const cx = e.x + 35, cy = e.y + 60;
    enemyBullets.push({ x: cx, y: cy, dx: 0, dy: 7, heal: Math.random() < 0.05 });
    enemyBullets.push({ x: cx, y: cy, dx: -4, dy: 6, heal: Math.random() < 0.05 });
    enemyBullets.push({ x: cx, y: cy, dx: 4, dy: 6, heal: Math.random() < 0.05 });
  }

  function resetGame() {
    playerX = WIDTH/2 - 90;
    playerY = HEIGHT - 200;
    playerHp = PLAYER_MAX_HP;
    bullets.length = 0;
    enemyBullets.length = 0;
    enemies.length = 0;
    explosions.length = 0;
    boss = null;
    upgradeLevel = 0;
    upgradeGauge = 0;
    distance = 0;
    bossSpawned = [false,false,false,false];
    bossClearedThisRun = [false,false,false,false];
    state = 'playing';
  }

  // === 입력 ===
  const keys = {};
  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    keys[e.key] = true;
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // 조이스틱 (가상)
    const joystickZone = document.getElementById('joystickZone');
    const joystickStick = document.getElementById('joystickStick');
    const JOY_RADIUS = 50;
    let joyTouchId = null;
    function setJoyKeys(dx, dy) {
      const deadzone = 0.25;
      keys['ArrowUp'] = dy < -deadzone;
      keys['ArrowDown'] = dy > deadzone;
      keys['ArrowLeft'] = dx < -deadzone;
      keys['ArrowRight'] = dx > deadzone;
    }
    function joyFromPos(zone, clientX, clientY) {
      const rect = zone.getBoundingClientRect();
      const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
      let dx = (clientX - cx) / (rect.width/2);
      let dy = (clientY - cy) / (rect.height/2);
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len > 1) { dx /= len; dy /= len; }
      return [dx, dy];
    }
    function joyMove(e, isTouch) {
      const clientX = isTouch ? e.touches[0].clientX : e.clientX;
      const clientY = isTouch ? e.touches[0].clientY : e.clientY;
      const [dx, dy] = joyFromPos(joystickZone, clientX, clientY);
      setJoyKeys(dx, dy);
      joystickStick.style.transform = `translate(calc(-50% + ${Math.max(-JOY_RADIUS, Math.min(JOY_RADIUS, dx*JOY_RADIUS))}px), calc(-50% + ${Math.max(-JOY_RADIUS, Math.min(JOY_RADIUS, dy*JOY_RADIUS))}px))`;
    }
    function joyEnd() {
      joyTouchId = null;
      joystickZone.classList.remove('active');
      keys['ArrowUp'] = keys['ArrowDown'] = keys['ArrowLeft'] = keys['ArrowRight'] = false;
      joystickStick.style.transform = 'translate(-50%, -50%)';
    }
    joystickZone.addEventListener('touchstart', e => {
      e.preventDefault();
      if (joyTouchId === null) {
        joyTouchId = e.touches[0].identifier;
        joystickZone.classList.add('active');
        joyMove(e, true);
      }
    });
    joystickZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].identifier === joyTouchId) {
          joyMove({ touches: [e.touches[i]] }, true);
          break;
        }
      }
    });
    joystickZone.addEventListener('touchend', e => {
      e.preventDefault();
      let found = false;
      for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].identifier === joyTouchId) { found = true; break; }
      }
      if (!found) joyEnd();
    });
    joystickZone.addEventListener('mousedown', e => {
      e.preventDefault();
      joystickZone.classList.add('active');
      joyMove(e, false);
      const onMouseMove = (e2) => joyMove(e2, false);
      const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); joyEnd(); };
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
    // FIRE 버튼
    document.querySelector('.fireBtn').addEventListener('touchstart', e => { e.preventDefault(); keys[' '] = true; });
    document.querySelector('.fireBtn').addEventListener('touchend', e => { e.preventDefault(); keys[' '] = false; });
    document.querySelector('.fireBtn').addEventListener('mousedown', () => keys[' '] = true);
    document.querySelector('.fireBtn').addEventListener('mouseup', () => keys[' '] = false);
    document.querySelector('.fireBtn').addEventListener('mouseleave', () => keys[' '] = false);

  // === 메인 메뉴 ===
  function drawMenu() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = '#0096ff';
    ctx.font = 'bold 64px "Malgun Gothic", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('20000', WIDTH/2, HEIGHT/3);
    ctx.fillStyle = '#ffff00';
    ctx.font = '28px "Malgun Gothic", sans-serif';
    ctx.fillText(`Best Rank : ${bestRankString}`, WIDTH/2, HEIGHT/3 + 50);
    ctx.fillStyle = '#0096ff';
    ctx.font = '18px sans-serif';
    ctx.fillText('5% chance: blue bullets heal 30 HP', WIDTH/2, HEIGHT/3 + 90);
    ctx.fillStyle = '#0096ff';
    ctx.fillRect(WIDTH/2 - 100, HEIGHT/3 + 120, 200, 50);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('START', WIDTH/2, HEIGHT/3 + 155);
    ctx.fillStyle = '#fff';
    ctx.font = '20px sans-serif';
    ctx.fillText('ESC : Quit', WIDTH/2, HEIGHT/3 + 220);
  }

  function menuClick(x, y) {
    const r = { x: WIDTH/2 - 100, y: HEIGHT/3 + 120, w: 200, h: 50 };
    if (x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h) {
      try { assets.bgMusic.play(); } catch(e){}
      for (let i = 0; i < 80; i++) stars.push({ x: Math.random()*WIDTH, y: Math.random()*HEIGHT, s: 1+Math.random()*2 });
      resetGame();
    }
  }

  // === 게임 오버 / 클리어 ===
  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 56px "Malgun Gothic", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', WIDTH/2, HEIGHT/3);
    ctx.fillStyle = '#fff';
    ctx.font = '24px sans-serif';
    ctx.fillText(`Distance : ${Math.floor(distance)} m`, WIDTH/2, HEIGHT/3 + 80);
    ctx.fillText(`Best Rank : ${bestRankString}`, WIDTH/2, HEIGHT/3 + 120);
    ctx.fillStyle = '#00ff00';
    ctx.fillText('R : Restart', WIDTH/2, HEIGHT/3 + 200);
    ctx.fillText('M : Main Menu', WIDTH/2, HEIGHT/3 + 240);
    ctx.fillStyle = '#fff';
    ctx.fillText('ESC : Quit', WIDTH/2, HEIGHT/3 + 280);
  }

  function drawGameClear() {
    ctx.fillStyle = 'rgba(0,0,20,0.9)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 56px "Malgun Gothic", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME CLEAR', WIDTH/2, HEIGHT/3 - 20);
    ctx.fillStyle = '#0096ff';
    ctx.font = '22px sans-serif';
    ctx.fillText('Platinum Boss Defeated!', WIDTH/2, HEIGHT/3 + 30);
    ctx.fillStyle = '#00ff00';
    ctx.fillText('Rank Cleared!', WIDTH/2, HEIGHT/3 + 70);
    ctx.fillStyle = '#fff';
    ctx.fillText(`Distance : ${Math.floor(distance)} m`, WIDTH/2, HEIGHT/3 + 120);
    ctx.fillText(`Best Rank : ${bestRankString}`, WIDTH/2, HEIGHT/3 + 160);
    ctx.fillStyle = '#00ff00';
    ctx.fillText('R : Restart', WIDTH/2, HEIGHT/3 + 230);
    ctx.fillText('M : Main Menu', WIDTH/2, HEIGHT/3 + 270);
    ctx.fillStyle = '#fff';
    ctx.fillText('ESC : Quit', WIDTH/2, HEIGHT/3 + 310);
  }

  function resultClick(x, y) {
    const cy = HEIGHT/3;
    if (y >= cy + 180 && y <= cy + 220) { resetGame(); return; }
    if (y >= cy + 220 && y <= cy + 270) { state = 'menu'; return; }
  }

  // === 게임 루프 ===
  let lastSpawn = 0;
  function gameLoop(ts) {
    if (state === 'menu') {
      drawMenu();
      requestAnimationFrame(gameLoop);
      return;
    }

    if (state === 'gameover') {
      drawGameOver();
      requestAnimationFrame(gameLoop);
      return;
    }
    if (state === 'clear') {
      drawGameClear();
      requestAnimationFrame(gameLoop);
      return;
    }

    // 입력
    if (keys['ArrowLeft'] && playerX > 0) playerX -= playerSpeed;
    if (keys['ArrowRight'] && playerX < WIDTH - 180) playerX += playerSpeed;
    if (keys['ArrowUp'] && playerY > 0) playerY -= playerSpeed;
    if (keys['ArrowDown'] && playerY < HEIGHT - 180) playerY += playerSpeed;
    if (keys[' '] && shootCd <= 0) { shootPlayer(); shootCd = 15; }
    if (shootCd > 0) shootCd--;

    // 적 스폰
    if (ts - lastSpawn > 1200) {
      lastSpawn = ts;
      spawnEnemy();
    }

    // 거리 / 보스 스폰
    if (!boss) distance += 1;
    for (let i = 0; i < 4; i++) {
      if (distance >= BOSS_DISTANCE[i] && !bossSpawned[i]) {
        spawnBoss(["Bronze","Silver","Gold","Platinum"][i]);
        bossSpawned[i] = true;
        break;
      }
    }

    // 적 이동
    for (const e of enemies) {
      e.y += 4;
      if (Math.random() < 0.01) enemyShoot(e);
    }
    enemies = enemies.filter(e => e.y < HEIGHT);

    // 총알
    for (const b of bullets) { b.x += b.dx; b.y += b.dy; }
    bullets = bullets.filter(b => b.y > 0 && b.x > 0 && b.x < WIDTH);
    for (const eb of enemyBullets) { eb.x += eb.dx; eb.y += eb.dy; }
    for (const eb of enemyBullets.slice()) {
      if (eb.y > HEIGHT || eb.x < 0 || eb.x > WIDTH) { enemyBullets.splice(enemyBullets.indexOf(eb),1); continue; }
      if (playerX < eb.x && eb.x < playerX+180 && playerY < eb.y && eb.y < playerY+180) {
        if (eb.heal) playerHp = Math.min(playerHp + 30, PLAYER_MAX_HP);
        else playerHp -= 10;
        enemyBullets.splice(enemyBullets.indexOf(eb), 1);
        if (playerHp <= 0) state = 'gameover';
      }
    }

    // 보스
    if (boss) {
      if (boss.y < 100) boss.y += 1;
      if (boss.x <= 0 || boss.x + 300 >= WIDTH) boss.direction *= -1;
      boss.x += boss.speed * boss.direction;
      bossShoot();
      for (const b of bullets.slice()) {
        if (boss.x < b.x && b.x < boss.x+300 && boss.y < b.y && b.y < boss.y+300) {
          boss.hp -= 20;
          bullets.splice(bullets.indexOf(b), 1);
          if (boss.hp <= 0) {
            createExplosion(boss.x+150, boss.y+150);
            const idx = boss.rankIndex;
            bossClearedThisRun[idx] = true;
            bossCleared[idx] = true;
            saveSave();
            if (idx === 3) { gameClearedOnce = true; saveSave(); state = 'clear'; }
            boss = null;
          }
          break;
        }
      }
    }

    // 적 vs 총알
    for (const e of enemies.slice()) {
      for (const b of bullets.slice()) {
        if (e.x < b.x && b.x < e.x+70 && e.y < b.y && b.y < e.y+70) {
          e.hp -= 20;
          bullets.splice(bullets.indexOf(b), 1);
          if (e.hp <= 0) {
            createExplosion(e.x+35, e.y+35);
            enemies.splice(enemies.indexOf(e), 1);
            if (upgradeLevel < MAX_UPGRADE) {
              upgradeGauge += 20;
              while (upgradeGauge >= GAUGE_MAX && upgradeLevel < MAX_UPGRADE) {
                upgradeLevel++; upgradeGauge -= GAUGE_MAX;
              }
            } else upgradeGauge = GAUGE_MAX;
          }
          break;
        }
      }
    }

    // 폭발
    for (const ex of explosions) {
      ex.x += ex.dx; ex.y += ex.dy; ex.life--;
    }
    explosions = explosions.filter(ex => ex.life > 0);

    updateBestRank();

    // === 그리기 ===
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    for (const s of stars) {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
      ctx.fill();
      s.y += 1;
      if (s.y > HEIGHT) { s.y = 0; s.x = Math.random()*WIDTH; }
    }

    const playerImg = upgradeLevel>0 ? assets.playerUpgrade : assets.playerBasic;
    if (assetsLoaded && playerImg.naturalWidth > 0) {
      ctx.drawImage(playerImg, playerX, playerY, 180, 180);
    } else {
      drawShip(playerX, playerY, 180, 180, '#0096ff', upgradeLevel > 0);
    }
    ctx.fillStyle = '#8b0000';
    ctx.fillRect(playerX, playerY-10, 180, 10);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(playerX, playerY-10, 180*playerHp/PLAYER_MAX_HP, 10);
    ctx.fillStyle = '#333';
    ctx.fillRect(playerX, playerY-22, 180, 8);
    ctx.fillStyle = '#0096ff';
    ctx.fillRect(playerX, playerY-22, 180*upgradeGauge/GAUGE_MAX, 8);

    for (const e of enemies) {
      if (assetsLoaded && assets.enemy.naturalWidth > 0) {
        ctx.drawImage(assets.enemy, e.x, e.y, 70, 70);
      } else {
        drawShip(e.x, e.y, 70, 70, '#ff4444', false);
      }
      ctx.fillStyle = '#8b0000';
      ctx.fillRect(e.x, e.y-6, 70, 6);
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(e.x, e.y-6, 70*e.hp/e.maxHp, 6);
    }
    for (const b of bullets) {
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
      ctx.fill();
    }
    for (const eb of enemyBullets) {
      ctx.fillStyle = eb.heal ? '#0096ff' : '#ff0000';
      ctx.beginPath();
      ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2);
      ctx.fill();
    }
    for (const ex of explosions) {
      ctx.fillStyle = ex.color;
      ctx.beginPath();
      ctx.arc(ex.x, ex.y, ex.size, 0, Math.PI*2);
      ctx.fill();
    }

    if (boss) {
      const bossImg = assets.bossImgs[boss.rankIndex];
      if (assetsLoaded && bossImg && bossImg.naturalWidth > 0) {
        ctx.drawImage(bossImg, boss.x, boss.y, 300, 300);
      } else {
        drawBossShape(boss.x, boss.y, 300, 300, boss.color);
      }
      ctx.fillStyle = '#8b0000';
      ctx.fillRect(boss.x, boss.y-12, 300, 10);
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(boss.x, boss.y-12, 300*boss.hp/boss.maxHp, 10);
    }

    ctx.fillStyle = '#fff';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Distance: ${distance}`, 20, 30);
    ctx.fillStyle = '#ffff00';
    ctx.fillText(getCurrentRank(), 20, 55);

    requestAnimationFrame(gameLoop);
  }

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    if (state === 'menu') menuClick(x, y);
    if (state === 'gameover' || state === 'clear') resultClick(x, y);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.close();
    if (e.key === 'r' && (state === 'gameover' || state === 'clear')) resetGame();
    if (e.key === 'm' && (state === 'gameover' || state === 'clear')) state = 'menu';
  });

  requestAnimationFrame(gameLoop);
})();
  </script>
</body>
</html>
